services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: traffic
      POSTGRES_PASSWORD: traffic
      POSTGRES_DB: incidents
    ports:
      # Host port only (defaults to 5432). Override if the host already runs Postgres:
      # POSTGRES_HOST_PORT=5433. The backend always reaches Postgres in-network at postgres:5432.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffic -d incidents"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      # Host port only (defaults to 6379). Override if the host already runs Redis:
      # REDIS_HOST_PORT=6380. The backend always reaches Redis in-network at redis:6379.
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgres://traffic:traffic@postgres:5432/incidents
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Comma-separated; add your deployed frontend URLs for cross-origin SSE/REST.
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:5174}
    ports:
      - "${API_PORT:-4000}:4000"

volumes:
  pgdata:
