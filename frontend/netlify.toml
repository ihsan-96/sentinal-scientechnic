# Netlify reads this file via the site's Package directory (= `frontend`, set automatically
# when you pick this workspace on import). The Base directory stays unset (= repo root), so
# `command` and `publish` are RELATIVE TO THE REPO ROOT — hence the `frontend/` prefix and the
# `-w frontend` build. (Mirrors the madian-tools workspace pattern.)
[build]
  command = "npm run build -w frontend"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "22"

# Set VITE_API_URL in Site settings → Environment variables (the deployed backend URL).

# SPA fallback so client routes resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
