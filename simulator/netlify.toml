# Netlify reads this file via the site's Package directory (= `simulator`, set automatically
# when you pick this workspace on import). The Base directory stays unset (= repo root), so
# `command` and `publish` are RELATIVE TO THE REPO ROOT. pnpm install + filtered build run
# from the root (Netlify auto-detects pnpm from pnpm-lock.yaml). Mirrors the madian-tools pattern.
[build]
  command = "pnpm --filter traffic-incidents-simulator build"
  publish = "simulator/dist"

[build.environment]
  NODE_VERSION = "22"

# Set VITE_API_URL in Site settings → Environment variables (the deployed backend URL).

# SPA fallback so client routes resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
