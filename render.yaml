# Render Blueprint — one-click deploy of the backend stack.
# Additive only: does NOT affect `docker compose up` (Render ignores docker-compose.yml
# and reuses backend/Dockerfile unchanged). The app needs zero code changes — every
# value below is wired into the env vars it already reads.
#
# Mirrors the local docker-compose stack exactly: self-hosted postgres:16-alpine +
# redis:7-alpine, same creds, same DATABASE_URL. Internal-only, so the password is the
# same throwaway one as compose.
#
# Deploy: push this repo to GitHub, then Render Dashboard → New → Blueprint → pick this
# repo. Set CORS_ORIGIN when prompted (it's marked sync:false). All services land in one
# region/environment, so they reach each other by bare service name.

services:
  # --- Postgres (self-hosted image, same as local). Reachable on the private network at
  #     `postgres:5432`, so DATABASE_URL below is byte-for-byte identical to compose.
  - type: pserv
    name: postgres
    runtime: image
    image:
      url: docker.io/library/postgres:16-alpine
    plan: starter            # always-on; no free tier for private services
    region: oregon
    envVars:
      - key: POSTGRES_USER
        value: traffic
      - key: POSTGRES_PASSWORD
        value: traffic
      - key: POSTGRES_DB
        value: incidents
    disk:
      name: pgdata
      mountPath: /var/lib/postgresql/data
      sizeGB: 1

  # --- Redis (self-hosted image, same as local: no password, IPv4 — matches the code's
  #     host/port-only contract in app.module.ts + cache/redis.provider.ts).
  - type: pserv
    name: redis
    runtime: image
    image:
      url: docker.io/library/redis:7-alpine
    plan: starter
    region: oregon

  # --- Backend (NestJS) built from the existing backend/Dockerfile, on a paid always-on
  #     instance so there is no spin-down / cold start. Dockerfile CMD auto-runs migrations.
  - type: web
    name: backend
    runtime: docker
    branch: main             # deploys from the repo you create the Blueprint from
    # Per Render's spec, dockerfilePath/dockerContext are relative to the REPO ROOT
    # (not affected by rootDir) — so both must include the backend/ prefix.
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend   # mirrors compose `build: ./backend`
    plan: starter            # always-on — this is what removes the cold start
    region: oregon
    healthCheckPath: /api/docs
    envVars:
      # Identical to the compose value — `postgres` resolves on Render's private network.
      - key: DATABASE_URL
        value: postgres://traffic:traffic@postgres:5432/incidents
      # Redis host/port resolved from the private service above (canonical internal host).
      - key: REDIS_HOST
        fromService:
          type: pserv
          name: redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: pserv
          name: redis
          property: port
      # Comma-separated deployed frontend origins (dashboard + simulator). Set in dashboard.
      - key: CORS_ORIGIN
        sync: false
      # PORT is intentionally omitted — Render injects it and main.ts reads it.
